# rules.yaml — zeroroot-ai/gibson-tool-runner
#
# Spec: unified-identity-and-authorization Phase J task 10.1.
# Schema: ../../../core/sdk/docs/rules-schema.yaml v1.0.0.

version: "1.0.0"

rules:
  - id: tool-runner-auth-001
    description: |
      No legacy auth references. The tool runner authenticates via
      Zitadel client_credentials only; gsk_ API keys, BetterAuth, HMAC
      identity headers, and TrustLocalhost are all deleted.
    scope:
      - "**/*.go"
      - "**/*.md"
      - "**/*.yaml"
    exempt:
      - "scripts/check-no-legacy-auth.sh"      # the guard itself
      - "**/*_test.go"
      - "docs/auth.md"
      - "docs/forbidden-patterns.md"
      - "docs/rules.yaml"
    pattern:
      kind: forbidden_string
      target: "(gsk_|GSK_API_KEY|HMAC|x-gibson-identity-mac|BetterAuth|better-auth|BETTER_AUTH|TrustLocalhost)"
    severity: error
    message: |
      Use Zitadel client_credentials via auth.ConnectDaemon. The legacy
      stack is gone; reintroducing any of these patterns reopens the
      audit findings the spec closed.
    enforced_by:
      - "script:scripts/check-no-legacy-auth.sh"
      - "ci:tool-runner-make-check"

  - id: tool-runner-auth-002
    description: |
      The Zitadel service-account credentials must be loaded from env
      (ZITADEL_TOOL_RUNNER_CLIENT_ID / _SECRET / ZITADEL_ISSUER), which
      a Helm-mounted Secret materialises at pod start. They must NOT
      be read from a local file, baked into the image, or echoed to a
      log line.
    scope:
      - "**/*.go"
    exempt:
      - "**/*_test.go"
    pattern:
      kind: forbidden_call
      target: "(fmt\\.Print[fl]?n?|log\\.|slog\\.).*CLIENT_SECRET"
    severity: error
    message: |
      Sanitize the log line. The secret enters via env and stays in
      the OIDC client; it is never spoken aloud.
    enforced_by:
      - "manual"

  - id: tool-runner-auth-003
    description: |
      The tool runner must NOT import the daemon module
      (github.com/zeroroot-ai/gibson). It depends on the SDK only —
      proto types, daemonclient, capabilitygrant. Importing the daemon
      would re-create the cyclic boundary the polyrepo avoids.
    scope:
      - "**/*.go"
      - "go.mod"
    pattern:
      kind: forbidden_import
      target:
        - "github.com/zeroroot-ai/gibson"
    severity: error
    message: |
      Import what you need from github.com/zeroroot-ai/sdk. If a type
      lives only in the daemon, open a PR moving it into the SDK first.
    enforced_by:
      - "manual"
      - "ci:tool-runner-make-check"

  - id: tool-runner-auth-004
    description: |
      auth.ConnectDaemon must remain the single entry point that wires
      OIDC env vars and dials the daemon. Splitting the wiring into
      multiple call sites makes credential plumbing harder to audit.
    scope:
      - "internal/auth/**/*.go"
      - "cmd/**/*.go"
    pattern:
      kind: required_call
      target: "auth\\.ConnectDaemon"
    severity: error
    message: |
      Use auth.ConnectDaemon(ctx) — it owns env translation + dial in
      one place. Don't replicate the daemonclient.New wiring inline.
    enforced_by:
      - "manual"

  - id: tool-runner-auth-005
    description: |
      SPIFFE detection is auto via the SDK; the tool runner must NOT
      read SPIFFE_ENDPOINT_SOCKET or call go-spiffe APIs directly.
      Subject identity is always Zitadel.
    scope:
      - "**/*.go"
    exempt:
      - "**/*_test.go"
    pattern:
      kind: forbidden_import
      target:
        - "github.com/spiffe/go-spiffe/v2/workloadapi"
        - "github.com/spiffe/go-spiffe/v2/svid/jwtsvid"
    severity: error
    message: |
      Use daemonclient.New (or future agent.Connect) — it composes
      SPIFFE detection automatically. Direct Workload API calls bypass
      that contract.
    enforced_by:
      - "manual"
