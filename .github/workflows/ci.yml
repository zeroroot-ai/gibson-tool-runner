name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    env:
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v6

      - name: configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - name: set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: build binary
        run: CGO_ENABLED=0 go build -o bin/gibson-runner ./cmd/gibson-runner

      - name: --list-tools outputs valid JSON
        run: |
          ./bin/gibson-runner --list-tools | jq . >/dev/null
          echo "Parsers advertised:"
          ./bin/gibson-runner --list-tools | jq -r '.[].name'

      - name: race tests
        run: go test -race ./...

      - name: install ripgrep
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ripgrep

      - name: no-legacy-auth guard
        run: bash scripts/check-no-legacy-auth.sh

      - name: no-legacy-auth guard unit tests
        run: bash scripts/__tests__/check-no-legacy-auth.test.sh
