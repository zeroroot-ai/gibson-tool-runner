name: release

# Publishes the --list-tools OCI catalog artifact on tag push.
# Image build has moved to image.yml (org reusable, slice 1.2, .github#47).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  catalog:
    name: publish tool catalog as OCI artifact
    runs-on: ubuntu-24.04
    env:
      GOPRIVATE: github.com/zero-day-ai
    steps:
      - uses: actions/checkout@v4

      - name: configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: compute tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # v0.1.0 -> 0.1.0
          MAJOR="v$(echo "$VERSION" | cut -d. -f1)"
          echo "semver=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: log in to GHCR
        uses: zero-day-ai/.github/.github/actions/ghcr-login@main
        with:
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: publish --list-tools catalog as OCI artifact
        run: |
          # Build a local binary, capture catalog, push as an OCI artifact
          # alongside the image so offline operators can ingest it.
          go version
          CGO_ENABLED=0 go build -o /tmp/gibson-runner ./cmd/gibson-runner
          /tmp/gibson-runner --list-tools > /tmp/catalog.json
          cat /tmp/catalog.json | jq -r '.[] | "  - " + .name + "  " + .version'

          # Use oras to push the catalog as an OCI artifact. Install from release.
          ORAS_VERSION=1.2.0
          curl -fsSL -o /tmp/oras.tar.gz "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/oras.tar.gz -C /usr/local/bin oras
          oras push \
              "ghcr.io/zero-day-ai/gibson-tool-runner-catalog:${{ steps.tags.outputs.semver }}" \
              --artifact-type application/vnd.gibson.tool-runner.catalog.v1+json \
              /tmp/catalog.json:application/json

      - name: release notes — parser catalog snapshot
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Parser catalog at ${GITHUB_REF_NAME}:" | tee -a "$GITHUB_STEP_SUMMARY"
          /tmp/gibson-runner --list-tools | jq -r '.[] | "  - \(.name) v\(.version): \(.description)"' >> "$GITHUB_STEP_SUMMARY"
