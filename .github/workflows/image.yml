name: image

# Builds + pushes ghcr.io/zeroroot-ai/gibson-executor to GHCR.
# Adopts the org reusable image-build workflow (slice 1.2, .github#47).
#
# The catalog OCI artifact (--list-tools) is published separately by release.yml.

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: zeroroot-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    secrets:
      ghtoken: ${{ secrets.GH_PAT_GIBSON_RO }}
    with:
      component_name: gibson-executor
      component_path: .
      dockerfile_path: Dockerfile
      image_name: ghcr.io/zeroroot-ai/gibson-executor
      tag_pattern: v(.*)

  # MCP-bridge runner — the generic connector host image (ADR-0048 Option 1).
  # Same repo, sibling image: one runner serves every package-distributed
  # vendor MCP server; gibson launches it as a setec Sandbox (gibson#684).
  bridge:
    uses: zeroroot-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    secrets:
      ghtoken: ${{ secrets.GH_PAT_GIBSON_RO }}
    with:
      component_name: gibson-mcp-bridge-runner
      component_path: .
      dockerfile_path: Dockerfile.mcp-bridge
      image_name: ghcr.io/zeroroot-ai/gibson-mcp-bridge-runner
      tag_pattern: v(.*)
